<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyLink — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">StudyLink</div>

      <div class="auth-tabs">
        <button class="auth-tab active">Sign In</button>
        <button class="auth-tab" onclick="window.location.href='register.html'">Register</button>
      </div>

      <label class="auth-label">University Email</label>
      <input class="auth-input" type="email" placeholder="name@my.yorku.ca" />
      <button class="btn-auth" onclick="window.location.href='dashboard.html'">Send Code</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
