<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyLink — Find Groups</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .find-groups-layout {
      display: flex;
      gap: 24px;
    }

    .courses-panel {
      width: 260px;
      flex-shrink: 0;
      height: fit-content;
    }

    .groups-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .group-card {
      display: flex;
      align-items: center;
    }

    .group-card-info {
      flex: 1;
    }

    .group-card-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tag {
      display: inline-block;
      padding: 6px 14px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-display);
      color: var(--white);
    }

    .tag-course { background: var(--tag-pink); }
    .tag-private { background: var(--tag-orange); }
    .tag-public { background: var(--tag-green); }

    .course-item {
      padding: 8px 0;
      font-size: 14px;
      color: var(--text-dark);
      cursor: pointer;
    }

    .course-item:hover {
      color: var(--red-primary);
    }

    .search-input-full {
      width: 100%;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
    }

    .search-input-full:focus {
      border-color: var(--red-primary);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">StudyLink</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">Dashboard</a>
        <a href="find-groups.html" class="sidebar-link active">Find Groups</a>
        <a href="profile.html" class="sidebar-link">Profile</a>
        <a href="admin.html" class="sidebar-link">Admin</a>
      </nav>
      <div class="sidebar-user">
        <div class="sidebar-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="name">User</div>
          <div class="email">user@gmail.com</div>
        </div>
      </div>
    </aside>

    <main class="content-area">
      <!-- Page Header -->
      <div class="d-flex justify-between align-center mb-24">
        <div>
          <div class="page-title">Find Groups</div>
          <div class="page-subtitle mb-0">Browse by course or search by name</div>
        </div>
        <button class="btn-primary">Create Group +</button>
      </div>

      <!-- Two-column layout -->
      <div class="find-groups-layout">

        <!-- Courses Panel -->
        <div class="courses-panel card">
          <div class="font-display fw-700 mb-12">Courses</div>
          <input type="text" class="search-input-full mb-16" placeholder="Filter Courses..." />
          <div class="course-item"> ITEC 3010</div>
          <div class="course-item">ITEC 3020</div>
          <div class="course-item">ITEC 3210</div>
        </div>

        <!-- Groups Panel -->
        <div class="groups-panel">
          <input type="text" class="search-input-full" placeholder="Search Groups..." />

          <!-- Group Card 1 -->
          <div class="card card-tight group-card">
            <div class="group-card-info">
              <div class="font-display fw-700 mb-8">Course Name..</div>
              <div class="d-flex align-center gap-12" style="flex-wrap:wrap;">
                <span class="tag tag-course">ITEC 3010</span>
                <span class="fs-12 text-muted"><strong>152</strong> Members</span>
                <span class="tag tag-private">Private</span>
                <span class="fs-12 text-muted"><strong>200</strong> Cap</span>
              </div>
            </div>
            <div class="group-card-actions">
              <button class="btn-secondary btn-sm">Open</button>
              <button class="btn-primary btn-sm">Join</button>
            </div>
          </div>

          <!-- Group Card 2 -->
          <div class="card card-tight group-card">
            <div class="group-card-info">
              <div class="font-display fw-700 mb-8">Course Name..</div>
              <div class="d-flex align-center gap-12" style="flex-wrap:wrap;">
                <span class="tag tag-course">ITEC 3230</span>
                <span class="fs-12 text-muted"><strong>85</strong> Members</span>
                <span class="tag tag-public">Public</span>
                <span class="fs-12 text-muted"><strong>100</strong> Cap</span>
              </div>
            </div>
            <div class="group-card-actions">
              <button class="btn-secondary btn-sm">Open</button>
              <button class="btn-primary btn-sm">Join</button>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>
</body>
</html>
