<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyLink — Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">StudyLink</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">Dashboard</a>
        <a href="find-groups.html" class="sidebar-link">Find Groups</a>
        <a href="profile.html" class="sidebar-link active">Profile</a>
        <a href="admin.html" class="sidebar-link">Admin</a>
      </nav>
      <div class="sidebar-action-divider"></div>
      <div class="sidebar-actions">
        <a href="login.html" class="sidebar-action-link danger">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Log Out
        </a>
      </div>
      <div class="sidebar-user">
        <div class="sidebar-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="name">User</div>
          <div class="email">user&#64;gmail.com</div>
        </div>
      </div>
    </aside>

    <main class="content-area">
      <div class="page-title mb-20">Profile</div>

      <div class="profile-header-card mb-20">
        <div class="profile-avatar-lg">U</div>
        <div>
          <div class="profile-name">User</div>
          <div class="profile-meta">University | Degree Type</div>
        </div>
      </div>

      <div class="edit-info-card">
        <div class="edit-info-title">Edit Information</div>
        <div class="form-grid">

          <div class="form-field">
            <label class="form-label">Full Name</label>
            <input class="form-input" type="text" placeholder="Full Name" />
          </div>

          <div class="form-field">
            <label class="form-label">Major</label>
            <select class="form-input">
              <option>Select Major</option>
              <option>Information Technology</option>
              <option>Computer Science</option>
              <option>Business Administration</option>
              <option>Engineering</option>
            </select>
          </div>

          <div class="form-field">
            <label class="form-label">Study Year</label>
            <select class="form-input">
              <option>Select Year</option>
              <option>1st Year</option>
              <option>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
              <option>Graduate</option>
            </select>
          </div>

          <div class="form-field">
            <label class="form-label">Minor</label>
            <input class="form-input" type="text" placeholder="Minor" />
          </div>

          <div class="form-field">
            <label class="form-label">Interests</label>
            <input class="form-input" type="text" placeholder="Interests" />
          </div>

          <div class="form-field">
            <label class="form-label">Degree Type</label>
            <select class="form-input">
              <option>Select Degree</option>
              <option>Bachelor of Science</option>
              <option>Bachelor of Commerce</option>
              <option>Bachelor of Arts</option>
              <option>Master's</option>
              <option>PhD</option>
            </select>
          </div>
        </div>

        <div class="form-actions" style="margin-top:16px">
          <button class="btn-primary">Save Changes</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
