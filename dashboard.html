<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyLink — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">StudyLink</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active">Dashboard</a>
        <a href="find-groups.html" class="sidebar-link">Find Groups</a>
        <a href="profile.html" class="sidebar-link">Profile</a>
        <a href="admin.html" class="sidebar-link">Admin</a>
      </nav>
      <div class="sidebar-user">
        <div class="sidebar-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="name">User</div>
          <div class="email">user@gmail.com</div>
        </div>
      </div>
    </aside>

    <main class="content-area">
      <div class="base-page-shell">
        <div class="base-page-header">
          <div>
            <div class="page-title">Dashboard</div>
            <div class="page-subtitle">Base layout only</div>
          </div>
          <button class="btn-primary">Create Group</button>
        </div>

        <div class="base-button-row">
          <button class="btn-secondary">Upcoming Sessions</button>
          <button class="btn-secondary">Your Groups</button>
        </div>

        <div class="base-content-card">
          <div class="base-card-title">Groups</div>
          <p class="btn-tertiary">ITEC 3230 - Morning Study Crew <p class="btn-tertiary", style="color: rgb(0, 0, 0);">WEEK 5 REVIEW:<br /> March 4, 2:30PM</p>
          <p class="btn-tertiary"><a href="find-groups.html" class="btn-link">View All Groups</a> </p>
          <div class="base-card-title">Upcoming Sessions</div>
          <p class="btn-tertiary">You have a session on April 6th at 2:00 PM.<br />You have a session on April 13th at 2:00 PM.
          </p>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
